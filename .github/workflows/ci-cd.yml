name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  quality-gate:
    name: Quality & Unit Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚡ Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install Dependencies
        run: bun install --frozen-lockfile

      - name: 🔍 Lint & Typecheck
        run: |
          bun run lint
          bun run typecheck

      - name: 🧪 Run Tests
        run: bun run test --coverage

  release:
    name: Semantic Release
    needs: quality-gate
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: ⚡ Setup Bun
        uses: oven-sh/setup-bun@v2

      # Étape CRUCIALE : Configurer Node pour NPM avec le token
      # - name: 🛠️ Setup Node.js for NPM
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: "22"
      #     registry-url: "https://registry.npmjs.org"

      - name: 📦 Install Dependencies
        run: bun install --frozen-lockfile

      - name: 🏗️ Build Project
        run: bun run build

      - name: 🚀 Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        with:
          # On s'assure que le plugin npm est présent et actif
          extra_plugins: |
            @semantic-release/changelog@6.0.0
            @semantic-release/git

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # On définit aussi NODE_AUTH_TOKEN pour setup-node
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

          # @semantic-release/npm
